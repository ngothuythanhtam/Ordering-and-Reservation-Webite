# Common references
components:
  schemas:
    User: 
      type: object
      properties:
        userid:
          type: integer
          readOnly: true 
        userrole:
          type: string
          enum: [1,2]
          description: ID của vai trò người dùng
        username:
          type: string
          description: Tên người dùng
        userbirthday:
          type: string
          format: date
          description: Ngày sinh của người dùng
        userphone:
          type: string
          description: Số điện thoại của người dùng
        useremail:
          type: string
          format: email
          description: Email của người dùng
        userpwd:
          type: string
          format: password
          description: Mật khẩu tài khoản của người dùng
        useraddress:
          type: string
          description: Địa chỉ của người dùng
        useravatar:
          type: string
          readOnly: true
          description: Đường dẫn ảnh đại diện người dùng
        useravatarFile:
          type: string
          format: binary
          writeOnly: true
          description: Ảnh đại diện người dùng

    UserUpdate: 
      type: object
      properties:
        username:
          type: string
          description: Tên người dùng mới
        userbirthday:
          type: string
          format: date
          description: Ngày sinh mới của người dùng
        useraddress:
          type: string
          description: Địa chỉ mới của người dùng
        useravatar:
          type: string
          readOnly: true
          description: Đường dẫn ảnh đại diện người dùng
        useravatarFile:
          type: string
          format: binary
          writeOnly: true
          description: Ảnh đại diện mới của người dùng
    
    Table:
      type: object
      properties:
        table_id:
          type: integer
          readOnly: true
        table_number:
          type: string
          description: Tên bàn
        seating_capacity:
          type: integer
          description: Số lượng chỗ ngồi
        status:
          type: string
          enum: ['available', 'reserved', 'occupied']
          default: 'available'
          description: Trạng thái bàn
    
    Receipt: 
      type: object
      properties:
        order_id:
          type: integer
          readOnly: true
          description: Mã đơn hàng
        userid:
          type: integer
          readOnly: true
          description: Mã người dùng
        staff_id:
          type: integer
          default: 1
          readOnly: true
          description: Mã nhân viên
        reservation_id:
          type: integer
          readOnly: true
          description: Mã đơn đặt bàn
        order_date:
          type: string
          format: date
          description: Ngày đặt đơn
        total_price:
          type: integer
          readOnly: true
          description: Tổng số tiền
          default: 0
        status:
          type: string
          readOnly: true
          enum: ['Pending', 'Ordered', 'Completed', 'Canceled']
          default: 'Pending'
          description: Trạng thái đơn
    Verify: 
      type: object
      properties:
        order_id:
          type: integer
          readOnly: true
          description: Mã đơn hàng
        userid:
          type: integer
          readOnly: true
          description: Mã người dùng
        staff_id:
          type: integer
          default: 1
          readOnly: true
          description: Mã nhân viên
        reservation_id:
          type: integer
          readOnly: true
          description: Mã đơn đặt bàn
        order_date:
          type: string
          format: date
          description: Ngày đặt đơn
        total_price:
          type: integer
          readOnly: true
          description: Tổng số tiền
          default: 0
        status:
          type: string
          enum: ['Pending', 'Ordered', 'Completed', 'Canceled']
          default: 'Pending'
          description: Trạng thái đơn
    Complete: 
      type: object
      properties:
        order_id:
          type: integer
          description: Mã đơn hàng
        userid:
          type: integer
          readOnly: true
          description: Mã người dùng
        staff_id:
          type: integer
          default: 1
          description: Mã nhân viên
        reservation_id:
          type: integer
          readOnly: true
          default: null
          description: Mã đơn đặt bàn
        order_date:
          type: string
          format: date
          description: Ngày đặt đơn
        total_price:
          type: integer
          readOnly: true
          description: Tổng số tiền
          default: 0
        status:
          type: string
          enum: ['Completed']
          default: 'Pending'
          description: Trạng thái đơn    
    OrderItem: 
      type: object
      properties:
        order_item_id:
          type: integer
          readOnly: true
          description: Mã thêm món
        order_id:
          type: integer
          readOnly: true
          description: Mã đơn hàng
        item_id:
          type: integer
          description: Mã món
        quantity:
          type: number
          description: Số lượng
        price:
          type: number
          format: double
          readOnly: true
          description: Giá
  responses:
    200NoData:
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                description: Trạng thái phản hồi
                enum:
                  - success
              data:
                type: object
                nullable: true
                default: null
                description: Dữ liệu phản hồi
    '400':
      description: "Bad Request - ID không hợp lệ"
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                enum: [error]
              message:
                type: string
                description: "Thông điệp lỗi chi tiết"
    '404':
      description: "Not Found - Người dùng không tìm thấy"
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                enum: [error]
              message:
                type: string
                description: "Người dùng với ID chỉ định không được tìm thấy"
    '500':
      description: "Internal Server Error - Đã xảy ra lỗi bất ngờ trên máy chủ"
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                enum: [error]
              message:
                type: string
                description: "Thông điệp lỗi máy chủ nội bộ"
  parameters:
    userIdParam:
      name: id
      description: User ID
      required: true
      in: path
      schema:
        type: integer
    requestId:
      name: requestId
      description: ID request
      required: true
      in: path
      schema:
        type: integer
    limitParam:
      name: limit
      description: Number of records per page
      in: query
      schema:
        type: integer
        default: 5
        minimum: 1
        maximum: 100
      required: false
  pageParam:
    name: page
    description: Page number of records
    in: query
    schema:
      type: integer
      default: 1
      minimum: 1
    required: false